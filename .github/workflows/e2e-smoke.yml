name: E2E Smoke Tests

on:
  push:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ─── Tier 0: Credential probe (secrets not accessible in job if:) ──────
  check-secrets:
    runs-on: ubuntu-latest
    outputs:
      has-claude-key: ${{ steps.probe.outputs.has-claude-key }}
    steps:
      - id: probe
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            echo "has-claude-key=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-claude-key=false" >> "$GITHUB_OUTPUT"
            echo "::notice::ANTHROPIC_API_KEY not set — e2e-claude and e2e-mixed will be skipped"
          fi

  # ─── Tier 1: Deterministic (no API keys needed) ────────────────────────
  e2e-deterministic:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Setup uv (for Python script nodes)
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run deterministic workflow
        run: bun run cli workflow run e2e-deterministic --no-worktree "smoke test"

  # ─── Tier 2a: Claude provider ──────────────────────────────────────────
  e2e-claude:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: check-secrets
    # Skip when no Claude API key is configured (proxy mode supported via
    # ANTHROPIC_BASE_URL + ANTHROPIC_API_KEY secrets together)
    if: needs.check-secrets.outputs.has-claude-key == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install Claude Code CLI
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Claude smoke test
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
        run: |
          # YAML `env:` values don't expand `~`, so set CLAUDE_BIN_PATH in the
          # shell where $HOME resolves. The native installer drops the binary
          # at $HOME/.local/bin/claude.
          export CLAUDE_BIN_PATH="$HOME/.local/bin/claude"
          bun run cli workflow run e2e-claude-smoke --no-worktree "smoke test"

  # ─── Tier 2b: Codex provider ───────────────────────────────────────────
  e2e-codex:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Codex smoke test
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CODEX_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: bun run cli workflow run e2e-codex-smoke --no-worktree "smoke test"

  # ─── Tier 3: Mixed providers ───────────────────────────────────────────
  e2e-mixed:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [check-secrets, e2e-claude, e2e-codex]
    if: needs.check-secrets.outputs.has-claude-key == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Claude Code CLI
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run mixed providers test
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CODEX_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # YAML `env:` values don't expand `~`, so set CLAUDE_BIN_PATH in the
          # shell where $HOME resolves. The native installer drops the binary
          # at $HOME/.local/bin/claude.
          export CLAUDE_BIN_PATH="$HOME/.local/bin/claude"
          bun run cli workflow run e2e-mixed-providers --no-worktree "smoke test"
